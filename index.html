<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبكة طوفان الأقصى</title>
    <style>
        /* ====== الأساسيات ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #0a0e1a 0%, #1a1f35 40%, #2a1f3a 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة بنجوم متلألئة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(3px 3px at 40px 70px, rgba(255,215,0,0.8), transparent),
                radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.6), transparent),
                radial-gradient(3px 3px at 130px 80px, #ffd700, transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 200px 120px, #fff, transparent),
                radial-gradient(3px 3px at 250px 50px, rgba(255,215,0,0.6), transparent);
            background-size: 300px 300px;
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        .app-container {
            max-width: 450px;
            width: 100%;
            background: linear-gradient(180deg, #f5f0e8 0%, #e8e0d5 100%);
            border-radius: 56px 56px 40px 40px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.7),
                0 0 0 2px rgba(212, 175, 55, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.8);
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .app-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 35px 90px rgba(0, 0, 0, 0.8), 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        /* ====== شاشة الدخول ====== */
        .login-screen {
            padding: 40px 28px 44px;
            background: linear-gradient(180deg, #f5f0e8 0%, #ece4d8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
        }

        /* زخرفة ذهبية علوية */
        .login-screen::before {
            content: '✦ ✦ ✦';
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            color: #c9a84c;
            font-size: 14px;
            letter-spacing: 12px;
            opacity: 0.8;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin-top: 4px;
        }

        .brand .logo-main {
            font-size: 54px;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #8B7500 0%, #D4AF37 40%, #F5D061 70%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 8px rgba(212, 175, 55, 0.3));
            font-family: 'Cairo', sans-serif;
        }

        .brand .logo-sub {
            font-size: 24px;
            font-weight: 700;
            color: #5a3d2b;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #d4af37, #f5d061);
            padding: 6px 30px;
            border-radius: 60px;
            border: 2px solid #c9a84c;
            box-shadow: inset 0 2px 8px rgba(255, 215, 0, 0.3), 0 4px 12px rgba(0,0,0,0.06);
            font-family: 'Cairo', sans-serif;
            color: #3d2b1a;
        }

        .brand .logo-ahg {
            font-size: 16px;
            font-weight: 700;
            color: #8B7500;
            letter-spacing: 12px;
            margin-top: 4px;
            background: rgba(212, 175, 55, 0.15);
            padding: 4px 22px;
            border-radius: 40px;
            border: 1px solid #c9a84c;
            font-family: 'Cairo', sans-serif;
        }

        /* ====== حاوية الصورة ====== */
        .image-container {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 16 / 9;
            border-radius: 32px;
            border: 4px solid #d4af37;
            overflow: hidden;
            box-shadow: 
                0 8px 24px rgba(212, 175, 55, 0.2),
                inset 0 0 0 2px rgba(255, 215, 0, 0.3);
            background: linear-gradient(135deg, #2d1f12, #4d3624);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .image-container:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-container:hover img {
            transform: scale(1.05);
        }

        .image-fallback {
            color: #d4af37;
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            text-align: center;
            background: linear-gradient(135deg, #2d1f12, #4d3624);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 3px;
        }

        .welcome-box {
            background: linear-gradient(135deg, #f5e6d3, #ecdcc8);
            padding: 18px 32px;
            border-radius: 80px;
            box-shadow: 
                inset 0 2px 8px rgba(255, 215, 0, 0.2),
                0 8px 24px rgba(0, 0, 0, 0.06);
            width: 100%;
            text-align: center;
            border: 2px solid #d4af37;
            position: relative;
            overflow: hidden;
        }

        .welcome-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.08), transparent 60%);
            pointer-events: none;
        }

        .welcome-box h2 {
            font-size: 30px;
            font-weight: 700;
            color: #2d1f12;
            font-family: 'Cairo', sans-serif;
            position: relative;
            z-index: 1;
        }
        .welcome-box h2 span {
            font-weight: 900;
            background: linear-gradient(135deg, #8B7500, #D4AF37, #F5D061);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-btn {
            background: linear-gradient(135deg, #8B7500, #D4AF37, #F5D061);
            border: none;
            color: #1a1408;
            font-size: 26px;
            font-weight: 800;
            padding: 18px 50px;
            border-radius: 80px;
            width: 100%;
            max-width: 240px;
            box-shadow: 
                0 8px 0 #6B5A00,
                0 12px 30px rgba(212, 175, 55, 0.3);
            transition: all 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            letter-spacing: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(6px) scale(0.97);
            box-shadow: 0 2px 0 #6B5A00, 0 8px 20px rgba(212, 175, 55, 0.2);
        }

        .login-btn .icon-login {
            font-size: 30px;
            line-height: 1;
        }

        .login-footer {
            margin-top: 4px;
            color: #8B7500;
            font-size: 15px;
            letter-spacing: 3px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
        }

        /* ====== الشاشة الرئيسية ====== */
        .main-screen {
            background: linear-gradient(180deg, #f5f0e8 0%, #e8e0d5 100%);
            flex-direction: column;
            min-height: 580px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        /* ====== التحكم في إخفاء/إظهار الشاشات ====== */
        .login-screen.hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            position: absolute !important;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0 !important;
            transform: scale(0.95) translateY(20px);
        }

        .main-screen.hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            position: absolute !important;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0 !important;
            transform: scale(0.95) translateY(20px);
        }

        .main-screen.visible {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            position: relative !important;
            z-index: 2 !important;
            display: flex !important;
            transform: scale(1) translateY(0);
        }

        .login-screen.visible {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            position: relative !important;
            z-index: 2 !important;
            transform: scale(1) translateY(0);
        }

        /* ====== شريط ماركي ذهبي ====== */
        .marquee-wrap {
            background: linear-gradient(135deg, #1a1408, #3d2b1a, #1a1408);
            padding: 12px 0;
            border-bottom: 3px solid #d4af37;
            border-top: 3px solid #d4af37;
            overflow: hidden;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.4), 0 2px 8px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .marquee-wrap::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(26,20,8,0.9) 0%, transparent 20%, transparent 80%, rgba(26,20,8,0.9) 100%);
            pointer-events: none;
        }

        .marquee-text {
            display: inline-block;
            color: #F5D061;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            white-space: nowrap;
            animation: scrollMarquee 20s linear infinite;
            font-family: 'Cairo', sans-serif;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            padding: 0 30px;
            position: relative;
            z-index: 1;
        }

        @keyframes scrollMarquee {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ====== الهيدر ====== */
        .main-header {
            background: linear-gradient(135deg, #f5e6d3, #ecdcc8);
            padding: 22px 24px 18px;
            color: #2d1f12;
            border-bottom: 3px solid #d4af37;
            text-align: center;
            position: relative;
        }

        .main-header::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 15%;
            right: 15%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, #F5D061, #d4af37, transparent);
            border-radius: 50%;
        }

        .main-header .greeting {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: 'Cairo', sans-serif;
        }
        .main-header .greeting strong {
            font-weight: 900;
            background: linear-gradient(135deg, #8B7500, #D4AF37, #F5D061);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-header .sub-title {
            font-size: 20px;
            font-weight: 700;
            color: #5a3d2b;
            margin-top: 8px;
            letter-spacing: 5px;
            background: rgba(212, 175, 55, 0.12);
            display: inline-block;
            padding: 4px 32px;
            border-radius: 60px;
            border: 2px solid #d4af37;
            backdrop-filter: blur(4px);
            font-family: 'Cairo', sans-serif;
        }

        /* ====== بطاقة الشبكة ====== */
        .network-tab {
            background: linear-gradient(145deg, #f5e6d3, #ecdcc8);
            margin: 24px 20px 18px;
            border-radius: 40px;
            padding: 28px 22px 32px;
            box-shadow: 
                inset 0 2px 10px rgba(255, 215, 0, 0.15),
                0 10px 30px rgba(0, 0, 0, 0.06);
            border: 2px solid #d4af37;
            position: relative;
            overflow: hidden;
        }

        .network-tab::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -40%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .network-tab .tab-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 28px;
            font-weight: 800;
            color: #3d2b1a;
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 3px dashed #d4af37;
            font-family: 'Cairo', sans-serif;
            position: relative;
            z-index: 1;
        }

        .network-tab .tab-title .icon-network {
            font-size: 36px;
            filter: drop-shadow(0 2px 4px rgba(212, 175, 55, 0.3));
        }

        .link-card {
            background: linear-gradient(145deg, #faf5ed, #f0e8dc);
            border-radius: 32px;
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            border: 2px solid #d4af37;
            box-shadow: 
                inset 0 2px 8px rgba(255,215,0,0.1),
                0 4px 16px rgba(0,0,0,0.04);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 
                inset 0 2px 8px rgba(255,215,0,0.1),
                0 8px 24px rgba(212, 175, 55, 0.08);
        }

        .link-icon-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: linear-gradient(135deg, #f5e6d3, #ecdcc8);
            padding: 10px 28px;
            border-radius: 80px;
            border: 2px solid #d4af37;
            width: 100%;
            box-shadow: inset 0 2px 6px rgba(255,215,0,0.15);
        }

        .link-icon-area .icon-big {
            font-size: 44px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(212, 175, 55, 0.2));
        }

        .link-icon-area .icon-label {
            font-size: 20px;
            font-weight: 700;
            color: #3d2b1a;
            letter-spacing: 3px;
            font-family: 'Cairo', sans-serif;
        }

        .link-card .info-btn {
            background: linear-gradient(135deg, #8B7500, #D4AF37, #F5D061);
            border: none;
            color: #1a1408;
            font-weight: 800;
            font-size: 21px;
            padding: 16px 24px;
            border-radius: 80px;
            width: 100%;
            cursor: pointer;
            box-shadow: 
                0 6px 0 #6B5A00,
                0 8px 24px rgba(212, 175, 55, 0.2);
            transition: all 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Cairo', sans-serif;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .link-card .info-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .link-card .info-btn:hover::before {
            left: 100%;
        }

        .link-card .info-btn:active {
            transform: translateY(5px) scale(0.98);
            box-shadow: 0 1px 0 #6B5A00, 0 6px 18px rgba(212, 175, 55, 0.15);
        }

        .link-card .info-btn .icon-card {
            font-size: 28px;
            line-height: 1;
        }

        /* ====== الفوتر ====== */
        .custom-footer {
            background: linear-gradient(135deg, #f5e6d3, #ecdcc8);
            border-top: 3px solid #d4af37;
            padding: 20px 20px 24px;
            margin-top: 4px;
            text-align: center;
        }

        .custom-footer .footer-label {
            font-size: 20px;
            font-weight: 700;
            color: #3d2b1a;
            margin-bottom: 14px;
            letter-spacing: 1px;
            font-family: 'Cairo', sans-serif;
        }

        .footer-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer-contact .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #faf5ed, #f0e8dc);
            padding: 8px 22px 8px 16px;
            border-radius: 80px;
            border: 2px solid #d4af37;
            box-shadow: 
                0 4px 0 #b8962e,
                0 4px 12px rgba(0,0,0,0.06);
            transition: all 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            text-decoration: none;
            color: #2d1f12;
            font-weight: 700;
            font-size: 18px;
            font-family: 'Cairo', sans-serif;
        }

        .footer-contact .contact-item:active {
            transform: translateY(4px) scale(0.97);
            box-shadow: 0 0px 0 #b8962e, 0 4px 12px rgba(0,0,0,0.04);
        }

        .footer-contact .contact-item .icon-phone {
            font-size: 28px;
            line-height: 1;
        }

        .footer-contact .contact-item .icon-whatsapp {
            font-size: 34px;
            line-height: 1;
        }

        .footer-contact .contact-item .action-label {
            font-size: 18px;
            font-weight: 800;
            color: #1a1408;
        }

        .back-action {
            margin: 8px 20px 18px;
            display: flex;
            justify-content: center;
        }

        .back-action button {
            background: linear-gradient(135deg, #f5e6d3, #ecdcc8);
            border: 2px solid #d4af37;
            color: #3d2b1a;
            padding: 10px 32px;
            border-radius: 80px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 0 #b8962e, 0 4px 12px rgba(0,0,0,0.04);
            font-family: 'Cairo', sans-serif;
        }

        .back-action button:active {
            transform: translateY(4px) scale(0.97);
            box-shadow: 0 0px 0 #b8962e, 0 4px 12px rgba(0,0,0,0.02);
        }

        .back-action button .icon-back {
            font-size: 20px;
            line-height: 1;
        }

        /* ====== أيقونات ====== */
        .icon-arrow:before { content: "▶"; font-size: 14px; margin-left: 4px; }
        .icon-login { font-size: 30px; line-height: 1; }
        .icon-network { font-size: 36px; }
        .icon-card { font-size: 28px; }
        .icon-exit:before { content: "⇤"; font-size: 18px; }
        .icon-back { font-size: 20px; }

        /* ====== ريسponsive ====== */
        @media (max-width: 420px) {
            .login-screen { padding: 32px 16px 36px; }
            .brand .logo-main { font-size: 42px; letter-spacing: 6px; }
            .brand .logo-sub { font-size: 20px; padding: 4px 20px; letter-spacing: 6px; }
            .welcome-box h2 { font-size: 24px; }
            .login-btn { font-size: 22px; padding: 14px 30px; max-width: 200px; }
            .main-header .greeting { font-size: 22px; }
            .main-header .sub-title { font-size: 16px; padding: 4px 20px; letter-spacing: 3px; }
            .network-tab .tab-title { font-size: 22px; }
            .network-tab { padding: 20px 16px 24px; margin: 16px 14px 12px; }
            .link-icon-area .icon-label { font-size: 16px; }
            .link-card .info-btn { font-size: 17px; padding: 14px 16px; }
            .custom-footer .footer-label { font-size: 16px; }
            .footer-contact .contact-item { padding: 6px 14px 6px 10px; font-size: 15px; }
            .footer-contact .contact-item .action-label { font-size: 15px; }
            .back-action button { font-size: 15px; padding: 8px 22px; }
            .image-container { max-width: 100%; }
            .marquee-text { font-size: 17px; letter-spacing: 2px; }
            .app-container { border-radius: 40px 40px 32px 32px; }
        }

        @media (max-width: 360px) {
            .brand .logo-main { font-size: 34px; letter-spacing: 4px; }
            .brand .logo-sub { font-size: 16px; letter-spacing: 4px; padding: 4px 14px; }
            .welcome-box h2 { font-size: 20px; }
            .login-btn { font-size: 18px; padding: 12px 24px; max-width: 170px; }
            .main-header .greeting { font-size: 18px; }
            .network-tab .tab-title { font-size: 18px; gap: 10px; }
            .link-icon-area { padding: 6px 16px; gap: 8px; }
            .link-icon-area .icon-big { font-size: 32px; }
            .link-icon-area .icon-label { font-size: 14px; letter-spacing: 1px; }
            .link-card .info-btn { font-size: 14px; padding: 10px 12px; }
            .footer-contact { gap: 12px; }
            .footer-contact .contact-item { font-size: 13px; padding: 4px 10px 4px 8px; }
            .footer-contact .contact-item .action-label { font-size: 13px; }
            .footer-contact .contact-item .icon-phone { font-size: 20px; }
            .footer-contact .contact-item .icon-whatsapp { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <!-- ====== شاشة الدخول ====== -->
    <div class="login-screen visible" id="loginScreen">
        <div class="brand">
            <div class="logo-main">AHG</div>
            <div class="logo-sub">ALHAMADI</div>
            <div class="logo-ahg">GROUP</div>
        </div>

        <div class="image-container" id="imageContainer">
            <img src="https://raw.githubusercontent.com/abrahymalmhady7-alt/brhom/main/Logo.jpg" alt="ALHAMADI GROUP" id="logoImage" />
        </div>

        <div class="welcome-box">
            <h2>مرحباً بك <span>عميلنا الحبيب</span></h2>
        </div>

        <button class="login-btn" id="loginBtn" onclick="showMain()">
            <span class="icon-login">⏎</span> دخول
        </button>

        <div class="login-footer">✦ ALHAMADI GROUP • 2026 ✦</div>
    </div>

    <!-- ====== الشاشة الرئيسية ====== -->
    <div class="main-screen hidden" id="mainScreen">
        <div class="marquee-wrap">
            <span class="marquee-text">🌟 مرحبا بكم في شبكة طوفان الاقصى ترقبو المفاجآت 🌟</span>
        </div>

        <div class="main-header">
            <div class="greeting">👑 مرحبا بك <strong>عميلنا الحبيب</strong></div>
            <div class="sub-title">شبكة طوفان الأقصى</div>
        </div>

        <div class="network-tab" id="networkTab">
            <div class="tab-title">
                <span class="icon-network">🏛️</span> 
                <span>شبكة طوفان الأقصى</span>
            </div>

            <div class="link-card">
                <div class="link-icon-area">
                    <span class="icon-big">🪪</span>
                    <span class="icon-label">بطاقة العميل</span>
                </div>

                <button class="info-btn" id="openLinkBtn" onclick="openLink()">
                    <span class="icon-card">🪪</span> للحصول على معلومات كرتك اضغط هنا
                </button>

                <span id="hiddenLink" style="display:none;">http://a.com/status</span>
            </div>
        </div>

        <div class="custom-footer">
            <div class="footer-label">📞 للشكاوي والاستفسار التواصل مع المهندس</div>
            <div class="footer-contact">
                <a href="tel:773108586" class="contact-item" id="callBtn">
                    <span class="icon-phone">📞</span>
                    <span class="action-label">اتصال</span>
                </a>
                <a href="https://wa.me/967773108586" target="_blank" class="contact-item" id="whatsappBtn">
                    <span class="icon-whatsapp">💬</span>
                    <span class="action-label">واتساب</span>
                </a>
            </div>
        </div>

        <div class="back-action">
            <button id="logoutBtn" onclick="showLogin()">
                <span class="icon-back">←</span> خروج
            </button>
        </div>
    </div>
</div>

<script>
    function showMain() {
        var login = document.getElementById('loginScreen');
        var main = document.getElementById('mainScreen');
        login.className = 'login-screen hidden';
        main.className = 'main-screen visible';
    }

    function showLogin() {
        var login = document.getElementById('loginScreen');
        var main = document.getElementById('mainScreen');
        login.className = 'login-screen visible';
        main.className = 'main-screen hidden';
    }

    function openLink() {
        var link = 'http://a.com/status';
        try {
            window.open(link, '_blank');
        } catch (e) {
            window.location.href = link;
        }
    }

    // ====== معالجة خطأ تحميل الصورة ======
    document.addEventListener('DOMContentLoaded', function() {
        var img = document.getElementById('logoImage');
        var container = document.getElementById('imageContainer');

        img.onerror = function() {
            container.innerHTML = '<div class="image-fallback">🏛️ ALHAMADI GROUP</div>';
            container.style.background = 'linear-gradient(135deg, #2d1f12, #4d3624)';
            container.style.display = 'flex';
            container.style.alignItems = 'center';
            container.style.justifyContent = 'center';
        };
    });
</script>

</body>
</html>
